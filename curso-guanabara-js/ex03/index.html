<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contador</title>
</head>
<body>
    <header>
        <h1>Vamos Contar</h1>
    </header>
    <section>
        <div id="corpo">
            <p>Início: <input type="number" name="inputinicio" id="inputinicio"></p>
            <p>Fim: <input type="number" name="inputfim" id="inputfim"></p>
            <p>Passo: <input type="number" name="inputpasso" id="inputpasso" min="0"></p>

            <input type="button" value="Contar">

            <p id="contagem">Preparando a Contagem...</p>
        </div>
    </section>
    <footer>
        &copy;ArthurDalathéa
    </footer>
    <script src="script.js"></script>

</html>
