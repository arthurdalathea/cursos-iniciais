<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Analisador de Números</title>
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>

    <section>
        <div id="principal">
            <p>
                Número (entre 1 e 100):
                <input type="number" name="inputnumero" id="inputnumero" min="1" max="100">
                <input type="button" value="Adicionar" id="adicionar">
            </p>
            <select name="select" id="select" size="10"></select>
            <input type="button" value="Finalizar" id="finalizar">
            <input type="button" value="Limpar" id="limpar">
        </div>
    </section>

    <footer>
        <p>&COPY;ArthurDalathéa</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
